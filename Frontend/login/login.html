<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuitionHub Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="NavBar">

        <div class="logo">
            <img src="../Images/srccLogo.jpeg" alt="logo">
        </div>

        <div class="name">
            <p id="SRCC">SRCC Classes</p>
            <p id="fullform">Saraswati Rukmini Coaching Classes (SRCC)</p>
        </div>

        <a href="../home/home.html">
            <button class="Home-Btn">Home</button>
        </a>

    </div>
    <div class="login-container">

        <div class="login-card">

            <div class="logo-section">
                <img src="../Images/srccLogo.jpeg" alt="Logo">
                <h1>Tuition<span>Hub</span></h1>
                <p>Smart Tuition Management System</p>
            </div>

            <h2>Welcome Back</h2>

            <div class="role-selection">
                <button class="role active">Student</button>
                <button class="role">Teacher</button>
                <button class="role">Parent</button>
            </div>

            <form>

                <label>Email ID</label>
                <input type="email" placeholder="Enter Email Address">

                <label>Password</label>
                <input type="password" placeholder="Enter Password">

                <div class="forgot">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>

            </form>

        </div>

    </div>

</body>

</html>
