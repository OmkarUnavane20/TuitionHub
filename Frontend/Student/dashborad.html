<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuitionHub Student Dashboard</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="student.css">
</head>

<body>

    <div class="container">
        <div class="sidebar">
            <div class="logo">

                <div class="logo-header">
                    <img src="../Images/srccLogo.jpeg" alt="SRCC Logo">

                    <h2>SRCC</h2>
                </div>

                <p id="fullform">Saraswati Rukhmini Coaching Classes</p>
                <p class="portal">STUDENT PORTAL</p>

            </div>

            <ul>
                <li class="active"><i class="fa-solid fa-house"></i> Dashboard</li>
                <li><i class="fa-solid fa-users"></i> My Batch</li>
                <li><i class="fa-solid fa-calendar-check"></i> Attendance</li>
                <li><i class="fa-solid fa-wallet"></i> Fees</li>
                <li><i class="fa-solid fa-book"></i> Study Material</li>
                <li><i class="fa-solid fa-file-lines"></i> Tests & Results</li>
                <li><i class="fa-solid fa-bell"></i> Notifications</li>
                <li><i class="fa-solid fa-user"></i> Profile</li>
            </ul>

            <button class="logout">Logout</button>

        </div>

    </div>

</body>

</html>
