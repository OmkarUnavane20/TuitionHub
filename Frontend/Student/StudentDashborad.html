<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="student.css">

</head>

<body>
    <div class="navbar">
        <div class="logo">
            <img src="/Frontend/Images/srccLogo.jpeg" alt="logo">
        </div>
        <div class="name">
            <p id="SRCC">SRCC Classes</p>
            <p id="fullform">Saraswati Rukmini Coaching Classes (SRCC) </p>
        </div>


        <div class="nav-links">
            <a href="#"><i class="fa-solid fa-house"></i> Home</a>
            <a href="#"><i class="fa-solid fa-user"></i> Profile</a>
        </div>

        <div class="profile-image">
            <img src="/Frontend/Images/profile.jpg" alt="xyz-image">
        </div>
        <div class="student-name">Student Name</div>
        <button class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </div>



    <div class="card-container">

        <div class="cards">
            <div class="icon"><i class="fa-solid fa-users"></i></div>
            <div class="card-title">My Batch</div>
        </div>

        <div class="cards">
            <div class="icon"><i class="fa-solid fa-graduation-cap"></i></div>
            <div class="card-title">Academic</div>
        </div>

        <div class="cards">
            <div class="icon"><i class="fa-regular fa-clipboard"></i></div>
            <div class="card-title">Notes</div>
        </div>

        <div class="cards">
            <div class="icon"><i class="fa-solid fa-desktop"></i></div>
            <div class="card-title">Examination</div>
        </div>

        <div class="cards">
            <div class="icon"><i class="fa-solid fa-file-circle-check"></i></div>
            <div class="card-title">Leave</div>
        </div>

        <div class="cards">
            <div class="icon"><i class="fa-regular fa-id-badge"></i></div>
            <div class="card-title">Attendance</div>
        </div>

        <div class="cards">
            <div class="icon"><i class="fa-solid fa-wallet"></i></div>
            <div class="card-title">Account</div>
        </div>

        <div class="cards">
            <div class="icon"><i class="fa-solid fa-message"></i></div>
            <div class="card-title">Message</div>
        </div>

        <div class="cards">
            <div class="icon"><i class="fa-regular fa-circle-user"></i></div>
            <div class="card-title">Profile</div>
        </div>

    </div>

</body>

</html>
